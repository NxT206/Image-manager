<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Modular Private Vault</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="top-row">
    <button class="btn" id="pickFolder">📁 Connect</button>
    <input type="text" id="search" placeholder="Search tags/names...">
    <button class="btn btn-success" id="saveMetaBtn">💾 Save</button>
  </div>

  <div class="controls-bar">
    <div class="controls-group">
      <label for="viewSelect">View:</label>
      <select id="viewSelect">
        <option value="default">Default Grid</option>
        <option value="compact">Compact Grid</option>
        <option value="list">List View</option>
      </select>
    </div>

    <!-- Batch Selection Controls -->
    <div class="controls-group" id="batchGroup">
      <button class="btn" id="selectAllBtn" style="padding: 4px 8px; font-size: 11px;">Select Visible</button>
      <button class="btn btn-accent" id="batchTagBtn" style="display:none; padding: 4px 8px; font-size: 11px;">
        🏷️ Tag Selected (<span id="selectCount">0</span>)
      </button>
    </div>
  </div>

  <div class="tag-filter-bar" id="tagFilterBar"></div>
  <p id="status">No folder connected</p>
</header>

<main class="content-area">
  <div id="images"></div>
</main>

<div id="lightbox">
  <span class="close-lb">&times;</span>
  <img id="lbImg" src="">
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
